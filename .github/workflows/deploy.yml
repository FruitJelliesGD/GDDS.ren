name: Deploy VitePress to Tencent Cloud Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Deploy via SSH + PowerShell
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

          # 1. 打包构建产物
          cd docs/.vitepress/dist
          zip -r ../deploy.zip *
          cd ../../..

          # 2. 建立临时目录
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'powershell -Command "New-Item -ItemType Directory -Force -Path C:\Windows\Temp\deploy"'

          # 3. 上传 zip 到服务器临时目录
          scp docs/.vitepress/deploy.zip ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:"C:/Windows/Temp/deploy/deploy.zip"

          # 4. 远程解压到目标目录
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'powershell -Command "Expand-Archive -Path C:\Windows\Temp\deploy\deploy.zip -DestinationPath C:\Users\Administrator\Desktop\nginx-1.28.0\html -Force; Remove-Item -Path C:\Windows\Temp\deploy -Recurse -Force"'

      - name: Setup Python (for CDN refresh)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Alibaba Cloud CDN SDK
        run: pip install alibabacloud-cdn20180510

      - name: Refresh CDN cache
        env:
          ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          CDN_URL: 'https://gdds.ren/'
        run: |
          python3 - <<EOF
          from alibabacloud_cdn20180510.client import Client as CdnClient
          from alibabacloud_cdn20180510 import models
          from alibabacloud_tea_openapi import models as open_api_models

          config = open_api_models.Config(
              access_key_id='${ACCESS_KEY_ID}',
              access_key_secret='${ACCESS_KEY_SECRET}'
          )
          client = CdnClient(config)
          request = models.RefreshCachesRequest(
              object_paths=[f"${CDN_URL}"],
              # URL 刷新：不设置 dirs=True
          )
          response = client.refresh_caches(request)
          print("CDN refresh completed:", response.body)
          EOF