name: Deploy VitePress to Tencent Cloud Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Compress dist folder
        run: |
          cd docs/.vitepress/dist
          zip -r ../../../dist.zip .

      - name: Upload zip via SFTP
        uses: appleboy/sftp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist.zip"
          target: "C:/Users/Administrator/Desktop/"

      - name: Decompress and deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 进入临时目录
            cd C:\Users\Administrator\Desktop
            if (Test-Path dist.zip) {
              & 'C:\Program Files\7-Zip\7z.exe' x dist.zip -oC:\Users\Administrator\Desktop\nginx-1.28.0\html\ -y
              Remove-Item dist.zip -Force
              Write-Host "Deployment completed."
            } else {
              Write-Host "dist.zip not found!"
              exit 1
            }