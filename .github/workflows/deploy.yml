name: Deploy VitePress to Tencent Cloud Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Deploy via SSH + PowerShell
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

          # 1. 打包构建产物
          cd docs/.vitepress/dist
          zip -r ../deploy.zip *
          cd ../../..

          # 2. 确保服务器上存在临时目录（使用系统临时目录，更安全）
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "New-Item -ItemType Directory -Force -Path C:\Windows\Temp\deploy"

          # 3. 上传 zip 到服务器临时目录
          scp docs/.vitepress/deploy.zip ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:"C:/Windows/Temp/deploy/deploy.zip"

          # 4. 远程解压到目标目录
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} @"
          Expand-Archive -Path C:\Windows\Temp\deploy\deploy.zip -DestinationPath \"${{ secrets.SERVER_TARGET_PATH }}\" -Force;
          Remove-Item -Path C:\Windows\Temp\deploy -Recurse -Force
          "@