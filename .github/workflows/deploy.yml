name: Deploy VitePress to Tencent Cloud Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Deploy via SSH + PowerShell
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

          # 1. 将构建产物打包为 zip
          cd docs/.vitepress/dist
          zip -r ../deploy.zip *
          cd ../../..

          # 2. 将 zip 包传输到服务器的临时目录
          scp docs/.vitepress/deploy.zip ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:"C:/Temp/deploy.zip"

          # 3. 通过 SSH 执行 PowerShell 命令解压并覆盖目标目录
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} @"
          # 确保临时目录存在
          New-Item -ItemType Directory -Force -Path C:\Temp
          # 解压 zip 到目标目录，覆盖现有文件
          Expand-Archive -Path C:\Temp\deploy.zip -DestinationPath "${{ secrets.SERVER_TARGET_PATH }}" -Force
          # 清理临时文件
          Remove-Item C:\Temp\deploy.zip -Force
          "@